<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuresh AI Video Pro | Official</title>
    <style>
        :root { --accent: #00ff88; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        body { 
            background: var(--bg); color: #fff; font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        
        .container { 
            width: 90%; max-width: 400px; background: var(--glass); backdrop-filter: blur(25px); 
            border-radius: 30px; padding: 30px; border: 1px solid rgba(255,255,255,0.1); 
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        
        h1 { font-size: 24px; margin-bottom: 5px; letter-spacing: -1px; font-weight: 800; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; background: rgba(0,255,136,0.1); color: var(--accent); font-size: 10px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }

        .input-box { background: rgba(0,0,0,0.5); border: 1px solid #222; border-radius: 20px; padding: 15px; margin-bottom: 10px; transition: 0.3s; }
        .input-box:focus-within { border-color: var(--accent); }
        textarea { width: 100%; height: 80px; background: none; border: none; color: #fff; outline: none; resize: none; font-size: 15px; }

        #transNote { font-size: 11px; color: #555; text-align: left; margin-bottom: 20px; min-height: 15px; font-style: italic; }

        .gen-btn { width: 100%; padding: 16px; border-radius: 18px; border: none; background: #fff; color: #000; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .gen-btn:active { transform: scale(0.97); }
        .gen-btn:disabled { background: #222; color: #444; cursor: not-allowed; }

        .output-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 20px; margin-top: 25px; border: 1px solid #111; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; display: none; }

        .loader { display: none; width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.05); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .download-link { display: none; margin-top: 15px; color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">Vercel Backend Powered</div>
        <h1>Yuresh AI Video Pro</h1>
        <p style="color: #666; font-size: 13px; margin-bottom: 20px;">සිංහලෙන් ලියන්න - AI එකෙන් බලන්න</p>

        <div class="input-box">
            <textarea id="promptInp" placeholder="උදා: ලස්සන වෙරළක හිරු බැස යන දර්ශනයක්..."></textarea>
        </div>
        <div id="transNote">Ready to generate...</div>

        <button id="genBtn" class="gen-btn" onclick="generate()">Generate Video 🚀</button>

        <div class="output-box">
            <div class="loader" id="loading"></div>
            <span id="placeholder" style="color: #222; font-size: 12px;">වීඩියෝව මෙතැන දිස්වේවි</span>
            <video id="videoOut" controls playsinline></video>
        </div>

        <a id="dlBtn" class="download-link" href="#" target="_blank">බාගත කරන්න (Download) 📥</a>
    </div>

    <script>
        async function generate() {
            const promptVal = document.getElementById('promptInp').value;
            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loading');
            const video = document.getElementById('videoOut');
            const placeholder = document.getElementById('placeholder');
            const note = document.getElementById('transNote');
            const dlBtn = document.getElementById('dlBtn');

            if(!promptVal.trim()) return alert("කරුණාකර සිංහලෙන් යමක් ලියන්න!");

            // UI Setup
            btn.disabled = true;
            loader.style.display = "block";
            placeholder.style.display = "none";
            video.style.display = "none";
            dlBtn.style.display = "none";
            note.innerText = "පරිවර්තනය වෙමින් පවතියි...";

            try {
                // 1. Google Translate (No API Key needed)
                const transUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=si&tl=en&dt=t&q=${encodeURIComponent(promptVal)}`;
                const transRes = await fetch(transUrl);
                const transData = await transRes.json();
                const englishPrompt = `A cinematic, realistic 4k video of ${transData[0][0][0]}, high quality.`;
                note.innerText = "AI Prompt: " + englishPrompt;

                // 2. Vercel Backend එකට වීඩියෝව හදන්න ඉල්ලීමක් යැවීම
                const aiResponse = await fetch("/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        version: "3f04018850fe2a3f9e210a823ad74826774ca2d0ad8d7979f712716f6bbd6d7c",
                        input: { prompt: englishPrompt }
                    })
                });

                const prediction = await aiResponse.json();
                if(prediction.error) throw new Error(prediction.error);

                // 3. Status එක අපේම Backend එකෙන් චෙක් කිරීම (Polling)
                const checkStatus = setInterval(async () => {
                    const statusRes = await fetch(`/api/status?id=${prediction.id}`);
                    const data = await statusRes.json();

                    if(data.status === "succeeded") {
                        clearInterval(checkStatus);
                        loader.style.display = "none";
                        video.src = data.output[0];
                        video.style.display = "block";
                        dlBtn.href = data.output[0];
                        dlBtn.style.display = "inline-block";
                        btn.disabled = false;
                        note.innerText = "සාර්ථකව නිම විය! ✨";
                    } else if(data.status === "failed") {
                        clearInterval(checkStatus);
                        alert("Error: වීඩියෝව සෑදීම අසාර්ථක විය.");
                        btn.disabled = false;
                        loader.style.display = "none";
                    }
                }, 4000);

            } catch(e) {
                console.error(e);
                alert("පද්ධතියේ දෝෂයක්! කරුණාකර නැවත උත්සාහ කරන්න.");
                btn.disabled = false;
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
