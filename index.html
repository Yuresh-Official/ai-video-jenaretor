<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yuresh AI Pro | Ultra Fast</title>
    <style>
        :root { --accent: #00ff88; --bg: #000000; }

        /* අකුරු කොපි කිරීම සහ සිලෙක්ට් කිරීම සම්පූර්ණයෙන්ම Lock කිරීම */
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            box-sizing: border-box;
            outline: none;
        }

        body { 
            background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; 
            height: 100vh; width: 100vw; overflow: hidden; /* Scroll Lock */
            touch-action: none; /* පේජ් එක එහා මෙහා වීම වැලැක්වීමට */
        }
        
        .app-container { 
            width: 92%; max-width: 420px; background: rgba(20, 20, 20, 0.8); 
            backdrop-filter: blur(30px); border-radius: 35px; padding: 30px; 
            border: 1px solid rgba(255,255,255,0.08); text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.9);
        }

        h1 { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; margin: 0 0 5px 0; color: #fff; }
        .status-bar { font-size: 10px; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 25px; opacity: 0.8; }

        .input-group { background: #111; border: 1px solid #222; border-radius: 20px; padding: 15px; margin-bottom: 15px; }
        
        /* ටයිප් කරන කොටසට පමණක් Selection ඉඩ දීම */
        textarea { 
            width: 100%; height: 70px; background: none; border: none; 
            color: #fff; outline: none; resize: none; font-size: 15px; font-family: inherit;
            user-select: text !important; -webkit-user-select: text !important;
            touch-action: auto;
        }

        .action-btn { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; 
            background: var(--accent); color: #000; font-weight: 800; 
            cursor: pointer; font-size: 15px; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .action-btn:active { transform: scale(0.96); opacity: 0.9; }
        .action-btn:disabled { background: #222; color: #555; cursor: not-allowed; transform: none; }

        .preview-area { 
            width: 100%; aspect-ratio: 16/9; background: #080808; border-radius: 22px; 
            margin-top: 25px; border: 1px solid #1a1a1a; display: flex; 
            align-items: center; justify-content: center; position: relative; overflow: hidden;
        }
        
        video { width: 100%; height: 100%; border-radius: 22px; display: none; object-fit: cover; }

        /* Loader Animation */
        .spinner { 
            display: none; width: 35px; height: 35px; border: 3px solid rgba(255,255,255,0.05); 
            border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="app-container">
        <h1>YURESH AI PRO</h1>
        <div class="status-bar">Turbo Speed • No-Zoom Active</div>

        <div class="input-group">
            <textarea id="promptInp" placeholder="ඔබට අවශ්‍ය දේ සිංහලෙන් විස්තර කරන්න..."></textarea>
        </div>

        <button id="genBtn" class="action-btn" onclick="processAI()">Generate Turbo Video ⚡</button>

        <div class="preview-area">
            <div class="spinner" id="loader"></div>
            <span id="hint" style="color: #222; font-size: 11px; font-weight: 600;">වීඩියෝව මෙතැනට</span>
            <video id="videoPlayer" controls autoplay loop playsinline></video>
        </div>
    </div>

    <script>
        async function processAI() {
            const prompt = document.getElementById('promptInp').value;
            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const video = document.getElementById('videoPlayer');
            const hint = document.getElementById('hint');

            if(!prompt.trim()) return;

            // සයිට් එක රීෆ්‍රෙෂ් නොවී UI එක Update කිරීම
            btn.disabled = true;
            btn.innerText = "නිර්මාණය කරමින්...";
            loader.style.display = "block";
            video.style.display = "none";
            hint.style.display = "none";

            try {
                // 1. Instant Translation
                const tRes = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=si&tl=en&dt=t&q=${encodeURIComponent(prompt)}`);
                const tData = await tRes.json();
                const englishText = tData[0][0][0] + ", ultra realistic, cinematic lighting, 4k resolution";

                // 2. Server Request
                const response = await fetch("/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ input: { prompt: englishText } })
                });

                const task = await response.json();
                
                // 3. Fast Polling (තත්පර 2කට වරක් පරීක්ෂා කරයි)
                const checker = setInterval(async () => {
                    const statusRes = await fetch(`/api/status?id=${task.id}`);
                    const statusData = await statusRes.json();

                    if(statusData.status === "succeeded") {
                        clearInterval(checker);
                        loader.style.display = "none";
                        video.src = statusData.output[0];
                        video.style.display = "block";
                        btn.disabled = false;
                        btn.innerText = "Generate Turbo Video ⚡";
                    } else if(statusData.status === "failed") {
                        clearInterval(checker);
                        alert("Error! නැවත උත්සාහ කරන්න.");
                        btn.disabled = false;
                        btn.innerText = "Generate Turbo Video ⚡";
                        loader.style.display = "none";
                    }
                }, 2000); 

            } catch(e) {
                console.error(e);
                btn.disabled = false;
                loader.style.display = "none";
                btn.innerText = "Generate Turbo Video ⚡";
            }
        }
    </script>
</body>
</html>
