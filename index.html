<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Video Gen | Sri Lanka</title>
    <style>
        :root {
            --primary: #8a2be2;
            --secondary: #4b0082;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Animated Glows */
        .orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary), transparent 70%);
            filter: blur(100px);
            opacity: 0.15;
            z-index: -1;
            animation: float 20s infinite alternate;
        }
        @keyframes float {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p { color: #aaa; font-size: 14px; margin-bottom: 25px; }

        .input-group {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid #333;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .input-group:focus-within { border-color: var(--primary); box-shadow: 0 0 15px rgba(138, 43, 226, 0.2); }

        textarea {
            width: 100%;
            height: 100px;
            background: none;
            border: none;
            color: #fff;
            font-size: 16px;
            outline: none;
            resize: none;
            font-family: inherit;
        }

        .gen-btn {
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(138, 43, 226, 0.3);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .gen-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(138, 43, 226, 0.4); }
        .gen-btn:active { transform: scale(0.97); }

        .output-area {
            margin-top: 30px;
            width: 100%;
            aspect-ratio: 16/9;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            border: 1px dashed #444;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #videoElement { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* Loader Animation */
        .loader {
            display: none;
            width: 45px;
            height: 45px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .status-text { color: #555; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="orb"></div>

    <div class="container">
        <h1>Smart AI Video Gen</h1>
        <p>ලංකාවේ අංක 1 AI වීඩියෝ නිර්මාණකරු</p>

        <div class="input-group">
            <textarea id="promptInput" placeholder="ඔබට අවශ්‍ය වීඩියෝව ගැන විස්තර කරන්න... (උදා: සීගිරිය උඩින් යන ඩ්‍රෝන දර්ශනයක්)"></textarea>
        </div>

        <button class="gen-btn" onclick="generateAI()">
            <span>නිර්මාණය කරන්න</span> 🚀
        </button>

        <div class="output-area" id="outputBox">
            <div class="loader" id="loader"></div>
            <span id="placeholder" style="color: #444; font-size: 14px;">ඔබේ වීඩියෝව මෙතැන දිස්වේවි</span>
            <video id="videoElement" controls playsinline></video>
        </div>
        <div class="status-text" id="status">Ready to generate</div>
    </div>

    <script>
        async function generateAI() {
            const prompt = document.getElementById('promptInput').value;
            if(!prompt) {
                alert("කරුණාකර යම් විස්තරයක් ඇතුළත් කරන්න!");
                return;
            }

            const loader = document.getElementById('loader');
            const placeholder = document.getElementById('placeholder');
            const video = document.getElementById('videoElement');
            const status = document.getElementById('status');

            // UI එක Update කිරීම
            loader.style.display = "block";
            placeholder.style.display = "none";
            video.style.display = "none";
            status.innerText = "AI එක වීඩියෝව නිර්මාණය කරමින් පවතියි...";

            // සැබෑ AI API එකක් (Runway හෝ Replicate) සම්බන්ධ කරන තැන
            // දැනට අපි Demo එකක් විදිහට පෙන්වමු
            setTimeout(() => {
                loader.style.display = "none";
                status.innerText = "නිර්මාණය අවසන්!";
                
                // පරීක්ෂා කිරීමට sample වීඩියෝවක් (ඔයාට මෙය පසුව වෙනස් කළ හැක)
                // video.src = "YOUR_GENERATED_VIDEO_URL";
                // video.style.display = "block";
                
                alert("AI වීඩියෝව සාර්ථකව නිර්මාණය විය: " + prompt);
            }, 5000);
        }
    </script>
</body>
</html>
