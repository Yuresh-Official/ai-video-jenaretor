<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YURESH x ISHARA BEAST MODE</title>
    <style>
        :root { --accent: #ff0000; --bg: #000; --card: #111; }
        
        /* කොපි කිරීම සහ සිලෙක්ට් කිරීම වැලැක්වීමට */
        * { 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none; /* iOS Safari */
            -ms-user-select: none;     /* Internet Explorer/Edge */
            user-select: none;         /* Non-prefixed version, currently supported by Chrome, Opera and Firefox */
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            text-align: center; 
            padding: 15px; 
            overflow-x: hidden; 
            touch-action: pan-y; /* ඇඟිලි දෙකෙන් ලොකු කිරීම (Pinch zoom) බ්ලොක් කිරීමට */
        }
        
        .container { max-width: 400px; margin: auto; }

        /* --- PUSH-UP ANIMATION --- */
        .animation-box { height: 120px; display: flex; align-items: center; justify-content: center; margin-top: 10px; }
        .stickman { position: relative; width: 100px; height: 60px; animation: pushup 1.5s infinite ease-in-out; }
        .head { width: 15px; height: 15px; background: white; border-radius: 50%; position: absolute; left: 70px; top: -5px; }
        .body-line { width: 70px; height: 4px; background: white; position: absolute; top: 10px; transform: rotate(-10deg); border-radius: 5px; }
        .arm { width: 4px; height: 25px; background: #ff0000; position: absolute; left: 55px; top: 12px; border-radius: 5px; }
        .ground { width: 120px; height: 2px; background: #333; position: absolute; bottom: 0; }

        @keyframes pushup {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(20px) rotate(5deg); }
        }

        /* --- STAT CARD --- */
        .beast-card { 
            background: linear-gradient(180deg, #1a0000, #000); 
            padding: 25px 15px; border-radius: 30px; border: 2px solid #300; margin: 15px 0;
            box-shadow: 0 10px 40px rgba(255,0,0,0.2);
        }
        .day-label { font-size: 13px; color: #ff4d4d; font-weight: bold; text-transform: uppercase; }
        .count-value { font-size: 90px; font-weight: 900; line-height: 0.9; margin: 10px 0; color: #fff; }
        .unit { font-size: 11px; color: #888; font-weight: bold; letter-spacing: 2px; }

        /* --- CHECKBOXES --- */
        .checker-box { background: #0a0a0a; border-radius: 20px; padding: 10px; border: 1px solid #222; }
        .checker-row { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px; border-bottom: 1px solid #1a1a1a; 
        }
        .checker-row:last-child { border-bottom: none; }
        .name { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
        
        input[type="checkbox"] { 
            width: 35px; height: 35px; accent-color: var(--accent); cursor: pointer;
        }

        /* --- PROGRESS --- */
        .progress-box { margin-top: 15px; padding: 0 10px; }
        .pb-bg { width: 100%; background: #222; height: 6px; border-radius: 10px; overflow: hidden; }
        .pb-fill { height: 100%; background: var(--accent); width: 0%; transition: 1.5s; box-shadow: 0 0 10px var(--accent); }
        
        .footer { margin-top: 30px; font-size: 10px; color: #333; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;">

    <div class="container">
        <div class="animation-box">
            <div class="stickman">
                <div class="head"></div>
                <div class="body-line"></div>
                <div class="arm"></div>
                <div class="ground"></div>
            </div>
        </div>

        <div class="header" style="margin-top: -10px;">
            <h1 style="color:red; margin:0; font-size:26px;">BEAST MODE</h1>
            <p style="color:#555; font-size:10px; margin-top:5px;">YURESH x ISHARA 60-DAY PLAN</p>
        </div>

        <div class="beast-card">
            <div class="day-label" id="day-display">DAY --</div>
            <div class="count-value" id="target-display">0</div>
            <div class="unit">PUSH-UPS TODAY</div>
            
            <div class="progress-box">
                <div class="pb-bg"><div class="pb-fill" id="pb"></div></div>
                <div style="font-size: 10px; color: #666; margin-top: 8px;" id="prog-text">0% COMPLETE</div>
            </div>
        </div>

        <div class="checker-box">
            <div class="checker-row">
                <span class="name">YURESH</span>
                <input type="checkbox" id="check-yuresh" onchange="saveStatus('yuresh')">
            </div>
            <div class="checker-row">
                <span class="name">ISHARA</span>
                <input type="checkbox" id="check-ishara" onchange="saveStatus('ishara')">
            </div>
        </div>

        <div class="footer">
            DEVELOPED BY YURESH OFFICIAL | NARAMMALA
        </div>
    </div>

    <script>
        // චැලේන්ජ් එක පටන් ගත් දිනය (මාර්තු 25)
        const start = new Date("2026-03-25"); 
        const now = new Date();
        const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24)) + 1;

        let day = diff < 1 ? 1 : (diff > 60 ? 60 : diff);
        const pushups = 20 + (day - 1) * 4;

        document.getElementById('day-display').innerText = "DAY " + day;
        document.getElementById('target-display').innerText = pushups;

        const percent = Math.round((day / 60) * 100);
        document.getElementById('pb').style.width = percent + "%";
        document.getElementById('prog-text').innerText = percent + "% OF 60 DAYS DONE";

        const storageKey = "beast_mode_day_" + day;

        function saveStatus(user) {
            const isChecked = document.getElementById('check-' + user).checked;
            localStorage.setItem(storageKey + "_" + user, isChecked);
        }

        function loadStatus() {
            document.getElementById('check-yuresh').checked = localStorage.getItem(storageKey + "_yuresh") === 'true';
            document.getElementById('check-ishara').checked = localStorage.getItem(storageKey + "_ishara") === 'true';
        }

        window.onload = loadStatus;

        // ඇඟිලි දෙකෙන් Zoom කිරීම (Pinch) තවදුරටත් වැලැක්වීමට Script එකක්
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
