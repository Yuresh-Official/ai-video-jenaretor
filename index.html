<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YURESH HYBRID PLAYER</title>
    <style>
        :root { --accent: #ff0000; --bg: #000; }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; padding-bottom: 90px; }
        
        .header { text-align: center; padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .header h1 { margin: 0; font-size: 22px; color: var(--accent); letter-spacing: 2px; }

        .song-card { 
            background: #111; padding: 12px; border-radius: 15px; 
            display: flex; align-items: center; gap: 15px; margin-bottom: 10px;
            border: 1px solid #222; cursor: pointer; transition: 0.2s;
        }
        .song-card:active { border-color: var(--accent); transform: scale(0.98); }
        .song-img { width: 55px; height: 55px; border-radius: 10px; object-fit: cover; }
        
        .info { flex: 1; overflow: hidden; }
        .info div { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info span { font-size: 11px; color: #888; }

        #player { display: none; }
        
        .player-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #0a0a0a; padding: 15px; border-top: 1px solid #333; 
            text-align: center; box-shadow: 0 -5px 20px rgba(0,0,0,0.8);
        }
        #status { font-size: 12px; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <h1>YURESH LIVE 🎵</h1>
        <p style="font-size: 10px; color: #555;">YouTube Package එකෙන් ප්ලේ වේ</p>
    </div>

    <div id="loader" style="text-align: center; padding: 50px; font-size: 13px; color: #444;">සින්දු ලෝඩ් වෙමින් පවතියි...</div>
    <div id="list"></div>
    <div id="player"></div>

    <div class="player-bar">
        <div id="status">සින්දුවක් තෝරන්න...</div>
        <div style="font-size: 9px; color: #333; margin-top: 5px;">Powered by Yuresh Oficial</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // ඔයාගේ API Key එක මෙන්න
        const YT_API_KEY = 'AIzaSyBqa536TD4etKgCRCNPCwG5vje7k-sunlg'; 
        let ytPlayer;

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '0', width: '0', videoId: '',
                playerVars: { 'autoplay': 1, 'controls': 0 }
            });
        }

        async function fetchSongs() {
            try {
                const res = await fetch('/api/songs');
                const songs = await res.json();
                const list = document.getElementById('list');
                document.getElementById('loader').style.display = 'none';

                songs.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'song-card';
                    card.onclick = () => searchAndPlay(`${s.title} ${s.artist}`);
                    card.innerHTML = `
                        <img class="song-img" src="${s.img}">
                        <div class="info"><div>${s.title}</div><span>${s.artist}</span></div>
                        <span style="font-size: 10px; color: var(--accent);">LISTEN</span>
                    `;
                    list.appendChild(card);
                });
            } catch (e) { console.error("Error!"); }
        }

        async function searchAndPlay(query) {
            document.getElementById('status').innerText = "සොයමින් පවතියි...";
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&key=${YT_API_KEY}&type=video&maxResults=1`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                if(data.items && data.items.length > 0) {
                    const id = data.items[0].id.videoId;
                    ytPlayer.loadVideoById(id);
                    document.getElementById('status').innerText = "දැන් වාදනය වේ: " + query;
                } else {
                    document.getElementById('status').innerText = "සින්දුව හමු වූයේ නැත!";
                }
            } catch (err) {
                document.getElementById('status').innerText = "සීමාව ඉක්මවා ඇත (API Limit)";
            }
        }
        fetchSongs();
    </script>
</body>
</html>
