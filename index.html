<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YURESH 60-DAY BEAST MODE</title>
    <style>
        :root { --accent: #ff0000; --bg: #000; --card: #111; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; margin: 0; text-align: center; padding: 15px; }
        
        .container { max-width: 400px; margin: auto; }
        .header h1 { color: var(--accent); margin: 10px 0 0 0; font-size: 24px; text-transform: uppercase; font-weight: 900; }
        .header p { color: #555; font-size: 11px; margin-top: 5px; letter-spacing: 1px; }

        .beast-card { 
            background: linear-gradient(180deg, #1a0000, #000); 
            padding: 35px 15px; border-radius: 30px; 
            border: 2px solid #300; margin: 20px 0;
            box-shadow: 0 10px 40px rgba(255,0,0,0.15);
        }
        .day-label { font-size: 14px; color: #ff4d4d; font-weight: bold; text-transform: uppercase; }
        .count-value { font-size: 95px; font-weight: 900; line-height: 0.9; margin: 20px 0; color: #fff; }
        .unit { font-size: 12px; color: #888; font-weight: bold; letter-spacing: 2px; }

        .progress-box { margin-top: 25px; }
        .pb-bg { width: 100%; background: #222; height: 10px; border-radius: 20px; overflow: hidden; border: 1px solid #333; }
        .pb-fill { height: 100%; background: var(--accent); width: 0%; transition: 2s ease-in-out; box-shadow: 0 0 15px var(--accent); }

        .target-box { 
            background: #0a0a0a; padding: 20px; border-radius: 25px; 
            border: 1px solid #222; margin-top: 15px; text-align: left;
        }
        .target-title { font-size: 12px; color: #ff4d4d; font-weight: bold; margin-bottom: 10px; }
        .goal-item { font-size: 14px; color: #fff; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        
        .footer { margin-top: 30px; font-size: 10px; color: #444; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="container">
        <div class="header">
            <h1>BEAST MODE ON</h1>
            <p>දින 60 කින් ශක්තිමත් සිරුරක්</p>
        </div>

        <div class="beast-card">
            <div class="day-label" id="day-display">DAY 1</div>
            <div class="count-value" id="target-display">20</div>
            <div class="unit">PUSH-UPS TODAY</div>
            
            <div class="progress-box">
                <div class="pb-bg"><div class="pb-fill" id="pb"></div></div>
                <div style="font-size: 11px; color: #666; margin-top: 10px;" id="prog-text">0% GAINED</div>
            </div>
        </div>

        <div class="target-box">
            <div class="target-title">අද දවසේ ඉලක්ක (GOALS)</div>
            <div class="goal-item">🔥 පපුව පොළොවට තබා තත්පර 1ක් නවතින්න.</div>
            <div class="goal-item">⚓ අත් දෙකේ නහර එන්න නම් වතුර ගොඩක් බොන්න.</div>
            <div class="goal-item" id="mode-tip">🚀 අද ප්ලෑන් එක: Loading...</div>
        </div>

        <div class="footer">
            YURESH OFFICAL TRANSFORMATION SYSTEM
        </div>
    </div>

    <script>
        // පටන් ගත් දිනය (2026-03-25)
        const start = new Date("2026-03-25");
        const now = new Date();
        const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24)) + 1;

        let day = (diff > 60) ? 60 : diff;
        if (day < 1) day = 1;

        // පළමු දවසේ 20, දිනකට 4 බැගින් වැඩි වේ
        const pushups = 20 + (day - 1) * 4;

        document.getElementById('day-display').innerText = "DAY " + day;
        document.getElementById('target-display').innerText = pushups;

        // Progress
        const percent = Math.round((day / 60) * 100);
        document.getElementById('pb').style.width = percent + "%";
        document.getElementById('prog-text').innerText = percent + "% OF TRANSFORMATION DONE";

        // නහර එන්න සහ ශක්තිමත් වෙන්න විශේෂ උපදෙස්
        const phases = [
            "සිරුර හුරු කරගන්න (Focus on form)",
            "මස්පිඬු වර්ධනය (Hypertrophy phase)",
            "ශක්තිය වැඩි කිරීම (Strength phase)",
            "කැපී පෙනෙන මාංශපේෂී (Definition phase)",
            "උපරිම ශක්තිය (Beast level)"
        ];
        const currentPhase = Math.floor(day / 12);
        document.getElementById('mode-tip').innerText = "🚀 අද ප්ලෑන් එක: " + phases[currentPhase];
    </script>
</body>
</html>
