<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YURESH HYBRID PLAYER</title>
    <style>
        :root { --accent: #ff0000; --bg: #000; }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; padding-bottom: 90px; }
        
        .header { text-align: center; padding: 10px 0; border-bottom: 1px solid #222; margin-bottom: 15px; }
        .header h1 { margin: 0; font-size: 20px; color: var(--accent); letter-spacing: 2px; }

        /* වීඩියෝ එක පේන තැන */
        .video-container { 
            width: 100%; aspect-ratio: 16 / 9; background: #111; 
            border-radius: 15px; overflow: hidden; margin-bottom: 15px;
            border: 1px solid #333; display: none; /* සින්දුවක් තෝරනකල් හංගා ඇත */
        }
        #player { width: 100%; height: 100%; }

        .song-card { 
            background: #111; padding: 10px; border-radius: 12px; 
            display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
            border: 1px solid #222; cursor: pointer;
        }
        .song-card:active { border-color: var(--accent); }
        .song-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        
        .info { flex: 1; overflow: hidden; }
        .info div { font-size: 13px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info span { font-size: 10px; color: #888; }

        .player-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #0a0a0a; padding: 12px; border-top: 1px solid #333; 
            text-align: center;
        }
        #status { font-size: 12px; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <h1>YURESH LIVE 🎵</h1>
        <p style="font-size: 10px; color: #555;">YouTube Package එකෙන් ප්ලේ වේ</p>
    </div>

    <div class="video-container" id="v-container">
        <div id="player"></div>
    </div>

    <div id="loader" style="text-align: center; padding: 30px; font-size: 12px; color: #444;">සින්දු ලෝඩ් වෙමින් පවතියි...</div>
    <div id="list"></div>

    <div class="player-bar">
        <div id="status">සින්දුවක් තෝරන්න...</div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const YT_API_KEY = 'AIzaSyBqa536TD4etKgCRCNPCwG5vje7k-sunlg'; 
        let ytPlayer;

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '100%', width: '100%', videoId: '',
                playerVars: { 'autoplay': 1, 'controls': 1 }
            });
        }

        async function fetchSongs() {
            try {
                const res = await fetch('/api/songs');
                const songs = await res.json();
                const list = document.getElementById('list');
                document.getElementById('loader').style.display = 'none';

                songs.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'song-card';
                    card.onclick = () => searchAndPlay(`${s.title} ${s.artist}`);
                    card.innerHTML = `
                        <img class="song-img" src="${s.img}">
                        <div class="info"><div>${s.title}</div><span>${s.artist}</span></div>
                        <span style="font-size: 10px; color: var(--accent);">PLAY</span>
                    `;
                    list.appendChild(card);
                });
            } catch (e) { console.error("Error!"); }
        }

        async function searchAndPlay(query) {
            document.getElementById('status').innerText = "සොයමින් පවතියි...";
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&key=${YT_API_KEY}&type=video&maxResults=1`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                if(data.items && data.items.length > 0) {
                    const id = data.items[0].id.videoId;
                    
                    // වීඩියෝ එක පෙන්වනවා
                    document.getElementById('v-container').style.display = 'block';
                    
                    ytPlayer.loadVideoById(id);
                    document.getElementById('status').innerText = "දැන් වාදනය වේ: " + query;
                } else {
                    document.getElementById('status').innerText = "සින්දුව හමු වූයේ නැත!";
                }
            } catch (err) {
                document.getElementById('status').innerText = "API Limit Exceeded!";
            }
        }
        fetchSongs();
    </script>
</body>
</html>
