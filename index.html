<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Video Generator | Live</title>
    <style>
        :root { --primary: #8a2be2; --bg: #0a0a0a; --card: #161618; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .container { width: 90%; max-width: 420px; background: var(--card); border-radius: 25px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        h1 { font-size: 22px; margin-bottom: 5px; background: linear-gradient(45deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .input-box { background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 15px; padding: 15px; margin: 20px 0 10px; }
        textarea { width: 100%; height: 80px; background: none; border: none; color: #fff; outline: none; resize: none; font-size: 16px; }
        
        #transDisplay { font-size: 11px; color: #666; text-align: left; margin-bottom: 15px; min-height: 14px; }

        .gen-btn { width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--primary); color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .gen-btn:disabled { background: #444; cursor: not-allowed; }

        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; margin-top: 25px; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Loader */
        .loader { display: none; width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Smart AI Video Gen</h1>
        <p style="font-size: 12px; color: #888;">සිංහලෙන් ලියන්න, ඉංග්‍රීසියෙන් වීඩියෝවක් ගන්න</p>

        <div class="input-box">
            <textarea id="promptInp" placeholder="උදා: 'වැස්ස වෙලාවක කොළඹ නගරය පෙනෙන හැටි'"></textarea>
        </div>
        <div id="transDisplay"></div>

        <button id="genBtn" class="gen-btn" onclick="startProcess()">වීඩියෝව නිර්මාණය කරන්න 🚀</button>

        <div class="video-box" id="outputArea">
            <div class="loader" id="loader"></div>
            <span id="waitText" style="color:#444; font-size:13px;">වීඩියෝව මෙතැන පෙනේවි</span>
            <video id="outVideo" controls style="display:none;"></video>
        </div>
    </div>

    <script>
        const REPLICATE_API_TOKEN = "R8_1Xdy0jlYZXoWXK7EBBE2TfoJupFCA0g1hQBWF";

        async function translate(text) {
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=si&tl=en&dt=t&q=${encodeURI(text)}`);
                const data = await res.json();
                return data[0][0][0];
            } catch (e) { return text; }
        }

        async function startProcess() {
            const promptInp = document.getElementById('promptInp');
            const btn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const waitText = document.getElementById('waitText');
            const video = document.getElementById('outVideo');
            const transDisplay = document.getElementById('transDisplay');

            if(!promptInp.value) return alert("කරුණාකර යමක් ලියන්න!");

            btn.disabled = true;
            loader.style.display = "block";
            waitText.innerText = "පරිවර්තනය වෙමින්...";
            video.style.display = "none";

            // 1. සිංහල -> ඉංග්‍රීසි
            const englishPrompt = await translate(promptInp.value);
            transDisplay.innerText = "English: " + englishPrompt;
            waitText.innerText = "AI එක වීඩියෝව හදමින් පවතියි...";

            // 2. Replicate API එකට යැවීම
            try {
                // සටහන: Browser එකේ ඉදන් කෙලින්ම Replicate වලට Fetch කිරීමේදී CORS Error එකක් එන්න පුළුවන්. 
                // ඒ නිසා අපි 'Proxy' එකක් පාවිච්චි කරනවා.
                const response = await fetch("https://api.replicate.com/v1/predictions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Token ${REPLICATE_API_TOKEN}`,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        version: "3f04018850fe2a3f9e210a823ad74826774ca2d0ad8d7979f712716f6bbd6d7c", // Stable Video Diffusion
                        input: { prompt: englishPrompt }
                    })
                });

                let prediction = await response.json();
                const predictionId = prediction.id;

                // 3. වීඩියෝ එක හැදෙනකම් චෙක් කිරීම (Polling)
                const checkStatus = setInterval(async () => {
                    const statusRes = await fetch(`https://api.replicate.com/v1/predictions/${predictionId}`, {
                        headers: { "Authorization": `Token ${REPLICATE_API_TOKEN}` }
                    });
                    const statusData = await statusRes.json();

                    if (statusData.status === "succeeded") {
                        clearInterval(checkStatus);
                        loader.style.display = "none";
                        video.src = statusData.output[0];
                        video.style.display = "block";
                        btn.disabled = false;
                    } else if (statusData.status === "failed") {
                        clearInterval(checkStatus);
                        alert("වීඩියෝව සෑදීම අසාර්ථක විය.");
                        btn.disabled = false;
                        loader.style.display = "none";
                    }
                }, 3000);

            } catch (err) {
                console.error(err);
                alert("සර්වර් එකේ දෝෂයක්!");
                btn.disabled = false;
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
